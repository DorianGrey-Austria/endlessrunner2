name: Deploy SubwayRunner to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Prepare Production Files
      run: |
        mkdir -p deploy
        cp SubwayRunner/index.html deploy/
        cp -r SubwayRunner/js deploy/
        if [ -d "SubwayRunner/css" ]; then cp -r SubwayRunner/css deploy/; fi
        echo "Deploy contents:"
        find deploy -type f | head -30

    - name: Deploy to VPS via rsync
      run: |
        sudo apt-get install -y -qq sshpass > /dev/null 2>&1
        sshpass -p "${{ secrets.VPS_PASSWORD }}" rsync -rlgoDzvc --delete \
          -e "ssh -o StrictHostKeyChecking=no -p 22" \
          deploy/ root@${{ secrets.VPS_HOST }}:/var/www/endlessrunner.vibecoding.company/
      env:
        SSHPASS: ${{ secrets.VPS_PASSWORD }}

    - name: Verify Deployment
      run: |
        echo "Deployed to https://endlessrunner.vibecoding.company/"
