<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 TEST: 10 Levels Variant 3 - Hybrid Environment Functions</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            font-size: 14px;
            line-height: 1.6;
            max-height: 90vh;
            overflow-y: auto;
        }
        .level-btn {
            background: #00ff00;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .level-btn:hover { background: #00cc00; }
        .current { background: #ff00ff !important; }
        .error { background: #ff0000 !important; }
        #errorLog {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff0000;
            border-radius: 5px;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        #perfStats {
            margin-top: 10px;
            padding: 5px;
            background: rgba(0,100,255,0.1);
            border-radius: 5px;
            font-size: 11px;
        }
        .slow { color: #ff8800 !important; }
    </style>
</head>
<body>
    <div id="info">
        <h2>🎮 VARIANT 3: Hybrid Environment Functions</h2>
        <p><strong>Current Level:</strong> <span id="currentLevel">1</span></p>
        <p><strong>Level Name:</strong> <span id="levelName">-</span></p>
        <p><strong>Score:</strong> <span id="score">0</span></p>
        <p><strong>Approach:</strong> Level objects + createEnvironment functions</p>
        <div id="perfStats"></div>
        <div id="levelButtons"></div>
        <div id="errorLog"></div>
        <p style="margin-top: 15px; font-size: 12px; color: #aaa;">
            Press 1-9,0 to test each level<br>
            Space = Auto-cycle through all levels
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let currentLevelId = 1;
        let score = 0;
        let autoCycle = false;
        let autoCycleInterval = null;
        let errorCount = 0;
        let performanceData = {
            loadTimes: {},
            objectCounts: {},
            avgLoadTime: 0
        };

        function logError(message, error) {
            errorCount++;
            const errorLog = document.getElementById('errorLog');
            const timestamp = new Date().toLocaleTimeString();
            const errorMsg = `[${timestamp}] ${message}${error ? ': ' + error.message : ''}`;

            console.error(errorMsg, error);

            errorLog.style.display = 'block';
            const errorEntry = document.createElement('div');
            errorEntry.textContent = errorMsg;
            errorEntry.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
            errorEntry.style.marginBottom = '5px';
            errorLog.appendChild(errorEntry);

            if (errorLog.children.length > 10) {
                errorLog.removeChild(errorLog.firstChild);
            }
        }

        function updatePerfStats(levelId, loadTime, objectCount) {
            performanceData.loadTimes[levelId] = loadTime;
            performanceData.objectCounts[levelId] = objectCount;

            const times = Object.values(performanceData.loadTimes);
            performanceData.avgLoadTime = times.reduce((a,b) => a+b, 0) / times.length;

            const perfStats = document.getElementById('perfStats');
            let html = `⚡ Load time: ${loadTime.toFixed(0)}ms | Objects: ${objectCount}`;

            if (loadTime > 100) {
                html += `<br><span class="slow">⚠️ Slow load detected</span>`;
            }

            if (objectCount > 50) {
                html += `<br><span class="slow">⚠️ High object count</span>`;
            }

            html += `<br>Avg: ${performanceData.avgLoadTime.toFixed(0)}ms`;
            perfStats.innerHTML = html;
        }

        const LevelManager = {
            levels: {},
            currentLevel: 1,
            levelObjects: [],

            registerLevel: function(id, level) {
                this.levels[id] = level;
                console.log(`✅ Registered Level ${id}: ${level.name}`);
            },

            loadLevel: function(levelId) {
                const startTime = performance.now();
                try {
                    console.log(`🎮 Loading Level ${levelId}`);

                    this.cleanup();

                    if (this.levels[levelId]) {
                        const beforeCount = this.levelObjects.length;

                        this.currentLevel = levelId;
                        this.levels[levelId].load(scene, renderer);

                        const afterCount = this.levelObjects.length;
                        const loadTime = performance.now() - startTime;

                        currentLevelId = levelId;
                        updateUI(this.levels[levelId].name);
                        updatePerfStats(levelId, loadTime, afterCount);

                        console.log(`✅ Level ${levelId} loaded in ${loadTime.toFixed(0)}ms: ${this.levels[levelId].name}`);
                    } else {
                        throw new Error(`Level ${levelId} not found in registry`);
                    }
                } catch (error) {
                    logError(`Failed to load Level ${levelId}`, error);
                    const btn = document.getElementById(`btn-${levelId}`);
                    if (btn) btn.classList.add('error');
                }
            },

            cleanup: function() {
                try {
                    this.levelObjects.forEach(obj => {
                        try {
                            if (obj.parent) obj.parent.remove(obj);
                            if (obj.geometry) obj.geometry.dispose();
                            if (obj.material) {
                                if (Array.isArray(obj.material)) {
                                    obj.material.forEach(mat => mat.dispose());
                                } else {
                                    obj.material.dispose();
                                }
                            }
                        } catch (disposeError) {
                            console.warn('Error disposing object:', disposeError);
                        }
                    });
                    this.levelObjects = [];

                    if (this.levels[this.currentLevel]?.cleanup) {
                        this.levels[this.currentLevel].cleanup();
                    }
                } catch (error) {
                    logError('Cleanup error', error);
                }
            },

            addLevelObject: function(obj) {
                this.levelObjects.push(obj);
                return obj;
            }
        };

        function createLevel1Environment(scene, renderer) {
            scene.fog = new THREE.FogExp2(0x222222, 0.015);
            renderer.setClearColor(0x222222);

            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(10, 20, 10);
            scene.add(light);
            LevelManager.addLevelObject(light);
        }

        function createLevel2Environment(scene, renderer) {
            scene.fog = new THREE.FogExp2(0x001133, 0.025);
            renderer.setClearColor(0x001133);

            for (let i = 0; i < 10; i++) {
                const neonLight = new THREE.PointLight(i % 2 === 0 ? 0x00ffff : 0xff00ff, 1, 20);
                neonLight.position.set(-10 + Math.random() * 20, 5, -i * 10);
                scene.add(neonLight);
                LevelManager.addLevelObject(neonLight);
            }

            const gridHelper = new THREE.GridHelper(50, 50, 0x00ffff, 0x001133);
            gridHelper.position.y = 0;
            scene.add(gridHelper);
            LevelManager.addLevelObject(gridHelper);
        }

        function createLevel3Environment(scene, renderer) {
            scene.fog = new THREE.FogExp2(0xFFE4B5, 0.03);
            renderer.setClearColor(0xFFE4B5);

            const sunLight = new THREE.DirectionalLight(0xFFAA00, 1.2);
            sunLight.position.set(20, 30, 10);
            scene.add(sunLight);
            LevelManager.addLevelObject(sunLight);

            for (let i = 0; i < 8; i++) {
                const pyramid = new THREE.Mesh(
                    new THREE.ConeGeometry(3, 6, 4),
                    new THREE.MeshLambertMaterial({ color: 0xDEB887 })
                );
                pyramid.position.set(-15 + Math.random() * 30, 3, -i * 15);
                pyramid.rotation.y = Math.PI / 4;
                scene.add(pyramid);
                LevelManager.addLevelObject(pyramid);
            }
        }

        function createLevel4Environment(scene, renderer) {
            scene.fog = new THREE.FogExp2(0xE0FFFF, 0.04);
            renderer.setClearColor(0xE0FFFF);

            const iceLight = new THREE.DirectionalLight(0xCCEEFF, 0.9);
            iceLight.position.set(0, 20, 10);
            scene.add(iceLight);
            LevelManager.addLevelObject(iceLight);

            for (let i = 0; i < 12; i++) {
                const ice = new THREE.Mesh(
                    new THREE.IcosahedronGeometry(2 + Math.random() * 2),
                    new THREE.MeshPhongMaterial({
                        color: 0x88CCFF,
                        transparent: true,
                        opacity: 0.7,
                        shininess: 100
                    })
                );
                ice.position.set(-20 + Math.random() * 40, 2, -i * 10);
                scene.add(ice);
                LevelManager.addLevelObject(ice);
            }
        }

        function createLevel5Environment(scene, renderer) {
            scene.fog = new THREE.FogExp2(0xFF4500, 0.035);
            renderer.setClearColor(0x8B0000);

            const lavaLight = new THREE.PointLight(0xFF6600, 2, 50);
            lavaLight.position.set(0, -5, 0);
            scene.add(lavaLight);
            LevelManager.addLevelObject(lavaLight);

            for (let i = 0; i < 10; i++) {
                const lavaLight = new THREE.PointLight(0xFF0000, 2, 15);
                lavaLight.position.set(-10 + Math.random() * 20, 1, -i * 12);
                scene.add(lavaLight);
                LevelManager.addLevelObject(lavaLight);

                const rock = new THREE.Mesh(
                    new THREE.DodecahedronGeometry(1.5),
                    new THREE.MeshLambertMaterial({
                        color: 0x8B4513,
                        emissive: 0xFF0000,
                        emissiveIntensity: 0.3
                    })
                );
                rock.position.set(-15 + Math.random() * 30, 2, -i * 12);
                scene.add(rock);
                LevelManager.addLevelObject(rock);
            }
        }

        function createLevel6Environment(scene, renderer) {
            scene.fog = new THREE.FogExp2(0x000080, 0.05);
            renderer.setClearColor(0x000080);

            const waterLight = new THREE.DirectionalLight(0x0088FF, 0.6);
            waterLight.position.set(0, 20, 0);
            scene.add(waterLight);
            LevelManager.addLevelObject(waterLight);

            for (let i = 0; i < 15; i++) {
                const bubble = new THREE.Mesh(
                    new THREE.SphereGeometry(0.5 + Math.random() * 0.5),
                    new THREE.MeshPhongMaterial({
                        color: 0x88DDFF,
                        transparent: true,
                        opacity: 0.3
                    })
                );
                bubble.position.set(-20 + Math.random() * 40, -5 + Math.random() * 15, -i * 8);
                scene.add(bubble);
                LevelManager.addLevelObject(bubble);
            }

            for (let i = 0; i < 8; i++) {
                const coral = new THREE.Mesh(
                    new THREE.ConeGeometry(0.3, 1.5, 6),
                    new THREE.MeshLambertMaterial({ color: 0xFF6347 })
                );
                coral.position.set(-15 + Math.random() * 30, 0.75, -i * 15);
                scene.add(coral);
                LevelManager.addLevelObject(coral);
            }
        }

        function createLevel7Environment(scene, renderer) {
            scene.fog = new THREE.FogExp2(0x2F4F2F, 0.04);
            renderer.setClearColor(0x2F4F2F);

            const jungleLight = new THREE.DirectionalLight(0x88AA88, 0.7);
            jungleLight.position.set(10, 20, 10);
            scene.add(jungleLight);
            LevelManager.addLevelObject(jungleLight);

            for (let i = 0; i < 10; i++) {
                const tree = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.5, 0.7, 8),
                    new THREE.MeshLambertMaterial({ color: 0x8B4513 })
                );
                tree.position.set(-15 + Math.random() * 30, 4, -i * 12);
                scene.add(tree);
                LevelManager.addLevelObject(tree);

                const canopy = new THREE.Mesh(
                    new THREE.SphereGeometry(3),
                    new THREE.MeshLambertMaterial({ color: 0x228B22 })
                );
                canopy.position.set(tree.position.x, 8, tree.position.z);
                scene.add(canopy);
                LevelManager.addLevelObject(canopy);
            }

            for (let i = 0; i < 5; i++) {
                const ruin = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.8, 1, 6),
                    new THREE.MeshLambertMaterial({ color: 0x8B7355 })
                );
                ruin.position.set(-12 + Math.random() * 24, 3, -i * 20);
                scene.add(ruin);
                LevelManager.addLevelObject(ruin);
            }
        }

        function createLevel8Environment(scene, renderer) {
            scene.fog = new THREE.FogExp2(0x000033, 0.02);
            renderer.setClearColor(0x000000);

            const starGeom = new THREE.BufferGeometry();
            const starCount = 500;
            const positions = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 200;
                positions[i + 1] = (Math.random() - 0.5) * 200;
                positions[i + 2] = -50 - Math.random() * 150;
            }

            starGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const stars = new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xFFFFFF, size: 0.5 }));
            scene.add(stars);
            LevelManager.addLevelObject(stars);

            for (let i = 0; i < 8; i++) {
                const station = new THREE.Mesh(
                    new THREE.CylinderGeometry(2, 2, 8, 8),
                    new THREE.MeshLambertMaterial({ color: 0x444466, emissive: 0x222244, emissiveIntensity: 0.2 })
                );
                station.rotation.z = Math.PI / 2;
                station.position.set(-30 + Math.random() * 60, 5, -i * 20);
                scene.add(station);
                LevelManager.addLevelObject(station);

                const panel = new THREE.Mesh(
                    new THREE.BoxGeometry(4, 0.1, 2),
                    new THREE.MeshLambertMaterial({ color: 0x000088, emissive: 0x0000FF, emissiveIntensity: 0.1 })
                );
                panel.position.set(station.position.x, station.position.y + 3, station.position.z);
                scene.add(panel);
                LevelManager.addLevelObject(panel);
            }

            for (let i = 0; i < 15; i++) {
                const asteroid = new THREE.Mesh(
                    new THREE.IcosahedronGeometry(1 + Math.random() * 2),
                    new THREE.MeshLambertMaterial({ color: 0x696969 })
                );
                asteroid.position.set(-40 + Math.random() * 80, -10 + Math.random() * 30, -50 - Math.random() * 100);
                scene.add(asteroid);
                LevelManager.addLevelObject(asteroid);
            }
        }

        function createLevel9Environment(scene, renderer) {
            scene.fog = new THREE.FogExp2(0x9400D3, 0.04);
            renderer.setClearColor(0x4B0082);

            const crystalLight1 = new THREE.PointLight(0xFF00FF, 1, 30);
            crystalLight1.position.set(-10, 5, 0);
            scene.add(crystalLight1);
            LevelManager.addLevelObject(crystalLight1);

            const crystalLight2 = new THREE.PointLight(0x00FFFF, 1, 30);
            crystalLight2.position.set(10, 5, -20);
            scene.add(crystalLight2);
            LevelManager.addLevelObject(crystalLight2);

            for (let i = 0; i < 15; i++) {
                const crystalGroup = new THREE.Group();

                const mainCrystal = new THREE.Mesh(
                    new THREE.OctahedronGeometry(1 + Math.random() * 1.5),
                    new THREE.MeshPhongMaterial({
                        color: [0xFF00FF, 0x00FFFF, 0xFFFF00][Math.floor(Math.random() * 3)],
                        emissive: [0xFF00FF, 0x00FFFF, 0xFFFF00][Math.floor(Math.random() * 3)],
                        emissiveIntensity: 0.4,
                        transparent: true,
                        opacity: 0.8,
                        shininess: 100
                    })
                );
                mainCrystal.position.y = 2;
                mainCrystal.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);

                for (let j = 0; j < 3; j++) {
                    const smallCrystal = new THREE.Mesh(
                        new THREE.OctahedronGeometry(0.3 + Math.random() * 0.5),
                        mainCrystal.material.clone()
                    );
                    smallCrystal.position.set(
                        (Math.random() - 0.5) * 2,
                        0.5 + Math.random() * 1,
                        (Math.random() - 0.5) * 2
                    );
                    smallCrystal.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                    crystalGroup.add(smallCrystal);
                }

                crystalGroup.add(mainCrystal);
                crystalGroup.position.set(-20 + Math.random() * 40, 0, -i * 8);
                scene.add(crystalGroup);
                LevelManager.addLevelObject(crystalGroup);
            }
        }

        function createLevel10Environment(scene, renderer) {
            scene.fog = new THREE.FogExp2(0xFF1493, 0.07);
            renderer.setClearColor(0x8B008B);

            const riftLight = new THREE.DirectionalLight(0xFFD700, 0.5);
            riftLight.position.set(0, 10, 0);
            scene.add(riftLight);
            LevelManager.addLevelObject(riftLight);

            for (let i = 0; i < 10; i++) {
                const portalGroup = new THREE.Group();

                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(2, 0.3, 8, 16),
                    new THREE.MeshBasicMaterial({
                        color: 0x00FFFF,
                        emissive: 0x00FFFF,
                        emissiveIntensity: 1.0
                    })
                );

                const interior = new THREE.Mesh(
                    new THREE.CircleGeometry(2, 16),
                    new THREE.MeshBasicMaterial({
                        color: 0x000080,
                        emissive: 0x000080,
                        emissiveIntensity: 0.6,
                        transparent: true,
                        opacity: 0.7,
                        side: THREE.DoubleSide
                    })
                );

                portalGroup.add(ring);
                portalGroup.add(interior);
                portalGroup.position.set(-20 + Math.random() * 40, 3, -i * 15);
                scene.add(portalGroup);
                LevelManager.addLevelObject(portalGroup);

                const rift = new THREE.Mesh(
                    new THREE.SphereGeometry(1.5, 16, 8),
                    new THREE.MeshBasicMaterial({
                        color: 0xFF00FF,
                        wireframe: true,
                        transparent: true,
                        opacity: 0.4
                    })
                );
                rift.position.set(-15 + Math.random() * 30, 4, -i * 18);
                scene.add(rift);
                LevelManager.addLevelObject(rift);

                const platform = new THREE.Mesh(
                    new THREE.BoxGeometry(4, 0.5, 4),
                    new THREE.MeshLambertMaterial({
                        color: 0x8B008B,
                        emissive: 0xFF1493,
                        emissiveIntensity: 0.2
                    })
                );
                platform.position.set(-30 + Math.random() * 60, -5 + Math.random() * 20, -i * 15);
                scene.add(platform);
                LevelManager.addLevelObject(platform);
            }
        }

        const Level1 = {
            id: 1,
            name: "Classic Subway",
            load: function(scene, renderer) {
                createLevel1Environment(scene, renderer);
            },
            cleanup: function() {}
        };

        const Level2 = {
            id: 2,
            name: "Neon Night Run",
            load: function(scene, renderer) {
                createLevel2Environment(scene, renderer);
            },
            cleanup: function() {}
        };

        const Level3 = {
            id: 3,
            name: "Desert Storm",
            load: function(scene, renderer) {
                createLevel3Environment(scene, renderer);
            },
            cleanup: function() {}
        };

        const Level4 = {
            id: 4,
            name: "Arctic Tundra",
            load: function(scene, renderer) {
                createLevel4Environment(scene, renderer);
            },
            cleanup: function() {}
        };

        const Level5 = {
            id: 5,
            name: "Volcano Run",
            load: function(scene, renderer) {
                createLevel5Environment(scene, renderer);
            },
            cleanup: function() {}
        };

        const Level6 = {
            id: 6,
            name: "Underwater Depths",
            load: function(scene, renderer) {
                createLevel6Environment(scene, renderer);
            },
            cleanup: function() {}
        };

        const Level7 = {
            id: 7,
            name: "Jungle Temple",
            load: function(scene, renderer) {
                createLevel7Environment(scene, renderer);
            },
            cleanup: function() {}
        };

        const Level8 = {
            id: 8,
            name: "Space Station",
            load: function(scene, renderer) {
                createLevel8Environment(scene, renderer);
            },
            cleanup: function() {}
        };

        const Level9 = {
            id: 9,
            name: "Crystal Mines",
            load: function(scene, renderer) {
                createLevel9Environment(scene, renderer);
            },
            cleanup: function() {}
        };

        const Level10 = {
            id: 10,
            name: "Final Dimension",
            load: function(scene, renderer) {
                createLevel10Environment(scene, renderer);
            },
            cleanup: function() {}
        };

        function init() {
            try {
                if (typeof THREE === 'undefined') {
                    throw new Error('THREE.js not loaded');
                }

                console.log('✅ THREE.js loaded:', THREE.REVISION);

                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 5, 10);
                camera.lookAt(0, 2, 0);

                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
                scene.add(ambientLight);

                LevelManager.registerLevel(1, Level1);
                LevelManager.registerLevel(2, Level2);
                LevelManager.registerLevel(3, Level3);
                LevelManager.registerLevel(4, Level4);
                LevelManager.registerLevel(5, Level5);
                LevelManager.registerLevel(6, Level6);
                LevelManager.registerLevel(7, Level7);
                LevelManager.registerLevel(8, Level8);
                LevelManager.registerLevel(9, Level9);
                LevelManager.registerLevel(10, Level10);

                const levelCount = Object.keys(LevelManager.levels).length;
                console.log(`✅ All ${levelCount} levels registered!`);

                if (levelCount !== 10) {
                    logError(`Expected 10 levels, but only ${levelCount} registered`);
                }

                createLevelButtons();
                LevelManager.loadLevel(1);

                animate();
            } catch (error) {
                logError('Critical initialization error', error);
            }
        }

        function createLevelButtons() {
            const container = document.getElementById('levelButtons');
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.textContent = `L${i}`;
                btn.id = `btn-${i}`;
                btn.onclick = () => LevelManager.loadLevel(i);
                container.appendChild(btn);
            }
        }

        function updateUI(levelName) {
            document.getElementById('currentLevel').textContent = currentLevelId;
            document.getElementById('levelName').textContent = levelName;
            document.getElementById('score').textContent = score;

            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.remove('current');
            });
            const currentBtn = document.getElementById(`btn-${currentLevelId}`);
            if (currentBtn) currentBtn.classList.add('current');
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                autoCycle = !autoCycle;
                if (autoCycle) {
                    console.log('🔄 Auto-cycle enabled');
                    autoCycleInterval = setInterval(() => {
                        const nextLevel = (currentLevelId % 10) + 1;
                        LevelManager.loadLevel(nextLevel);
                        score += 100;
                    }, 3000);
                } else {
                    console.log('⏸️ Auto-cycle disabled');
                    clearInterval(autoCycleInterval);
                }
            }

            const digit = parseInt(e.key);
            if (digit >= 1 && digit <= 9) {
                LevelManager.loadLevel(digit);
                score += 100;
            } else if (e.key === '0') {
                LevelManager.loadLevel(10);
                score += 100;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
