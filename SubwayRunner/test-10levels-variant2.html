<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 TEST: 10 Levels Variant 2 - Array-Based Config</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            font-size: 14px;
            line-height: 1.6;
            max-height: 90vh;
            overflow-y: auto;
        }
        .level-btn {
            background: #00ff00;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .level-btn:hover { background: #00cc00; }
        .current { background: #ff00ff !important; }
        .error { background: #ff0000 !important; }
        #errorLog {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,0,0,0.2);
            border: 1px solid #ff0000;
            border-radius: 5px;
            font-size: 11px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        #configStatus {
            margin-top: 10px;
            padding: 5px;
            background: rgba(0,255,0,0.1);
            border-radius: 5px;
            font-size: 11px;
        }
        .warning { color: #ffaa00 !important; }
    </style>
</head>
<body>
    <div id="info">
        <h2>🎮 VARIANT 2: Array-Based Config System</h2>
        <p><strong>Current Level:</strong> <span id="currentLevel">1</span></p>
        <p><strong>Level Name:</strong> <span id="levelName">-</span></p>
        <p><strong>Score:</strong> <span id="score">0</span></p>
        <p><strong>Approach:</strong> Minimalist config array with generator functions</p>
        <div id="configStatus"></div>
        <div id="levelButtons"></div>
        <div id="errorLog"></div>
        <p style="margin-top: 15px; font-size: 12px; color: #aaa;">
            Press 1-9,0 to test each level<br>
            Space = Auto-cycle through all levels
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let currentLevelId = 1;
        let score = 0;
        let autoCycle = false;
        let autoCycleInterval = null;
        let levelObjects = [];
        let errorCount = 0;
        let generatorWarnings = [];

        const materialPool = new Map();
        const geometryPool = new Map();
        const MAX_GENERATOR_TIME = 5000;
        let generatorTimeouts = {};

        function logError(message, error) {
            errorCount++;
            const errorLog = document.getElementById('errorLog');
            const timestamp = new Date().toLocaleTimeString();
            const errorMsg = `[${timestamp}] ${message}${error ? ': ' + error.message : ''}`;

            console.error(errorMsg, error);

            errorLog.style.display = 'block';
            const errorEntry = document.createElement('div');
            errorEntry.textContent = errorMsg;
            errorEntry.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
            errorEntry.style.marginBottom = '5px';
            errorLog.appendChild(errorEntry);

            if (errorLog.children.length > 10) {
                errorLog.removeChild(errorLog.firstChild);
            }
        }

        function getPooledMaterial(key, createFn) {
            if (!materialPool.has(key)) {
                materialPool.set(key, createFn());
            }
            return materialPool.get(key);
        }

        function getPooledGeometry(key, createFn) {
            if (!geometryPool.has(key)) {
                geometryPool.set(key, createFn());
            }
            return geometryPool.get(key);
        }

        function clearPools() {
            materialPool.forEach(mat => mat.dispose());
            geometryPool.forEach(geo => geo.dispose());
            materialPool.clear();
            geometryPool.clear();
        }

        function validateLevelConfig(config) {
            const required = ['id', 'name', 'fog', 'bgColor', 'lights', 'objects'];
            const missing = required.filter(field => !config.hasOwnProperty(field));

            if (missing.length > 0) {
                throw new Error(`Level config missing required fields: ${missing.join(', ')}`);
            }

            if (typeof config.id !== 'number') {
                throw new Error(`Level id must be a number, got ${typeof config.id}`);
            }

            if (typeof config.name !== 'string' || config.name.length === 0) {
                throw new Error('Level name must be a non-empty string');
            }

            if (!config.fog || typeof config.fog.color !== 'number' || typeof config.fog.density !== 'number') {
                throw new Error('Level fog must have color and density numbers');
            }

            if (typeof config.bgColor !== 'number') {
                throw new Error('Level bgColor must be a number');
            }

            if (!Array.isArray(config.lights)) {
                throw new Error('lights must be an array');
            }

            config.lights.forEach((light, i) => {
                if (!light.type || !['directional', 'point'].includes(light.type)) {
                    throw new Error(`Light ${i}: invalid type '${light.type}'`);
                }
                if (typeof light.intensity !== 'number' || light.intensity < 0) {
                    throw new Error(`Light ${i}: intensity must be a positive number`);
                }
                if (!Array.isArray(light.pos) || light.pos.length !== 3) {
                    throw new Error(`Light ${i}: pos must be array of 3 numbers`);
                }
            });

            if (!Array.isArray(config.objects)) {
                throw new Error('objects must be an array');
            }

            config.objects.forEach((obj, i) => {
                if (!obj.type || typeof obj.type !== 'string') {
                    throw new Error(`Object ${i}: type must be a string`);
                }
                if (typeof obj.count !== 'number' || obj.count < 0) {
                    throw new Error(`Object ${i}: count must be a positive number`);
                }
            });

            return true;
        }

        function createFallbackObjects(count) {
            const fallbackGeom = getPooledGeometry('fallback-cube', () => new THREE.BoxGeometry(1, 1, 1));
            const fallbackMat = getPooledMaterial('fallback-mat', () => new THREE.MeshBasicMaterial({
                color: 0xff00ff,
                wireframe: true
            }));

            for (let i = 0; i < Math.min(count, 3); i++) {
                const cube = new THREE.Mesh(fallbackGeom, fallbackMat);
                cube.position.set(-5 + Math.random() * 10, 2, -i * 10);
                scene.add(cube);
                levelObjects.push(cube);
            }
        }

        function hotReloadConfig(newConfigs) {
            if (!Array.isArray(newConfigs)) {
                logError('Hot reload failed: newConfigs must be array');
                return false;
            }

            try {
                newConfigs.forEach((config, i) => validateLevelConfig(config));
                LEVEL_CONFIGS.length = 0;
                LEVEL_CONFIGS.push(...newConfigs);
                updateConfigStatus();
                console.log('✅ Hot-reloaded', newConfigs.length, 'configs');
                return true;
            } catch (error) {
                logError('Hot reload validation failed', error);
                return false;
            }
        }

        function updateConfigStatus() {
            const status = document.getElementById('configStatus');
            const configs = LEVEL_CONFIGS.length;
            const generators = Object.keys(ObjectGenerators).length;

            let html = `📊 ${configs} level configs, ${generators} object generators`;

            if (generatorWarnings.length > 0) {
                html += `<br><span class="warning">⚠️ ${generatorWarnings.length} warnings</span>`;
            }

            html += `<br>Pooled: ${materialPool.size} materials, ${geometryPool.size} geometries`;

            status.innerHTML = html;
        }

        const LEVEL_CONFIGS = [
            {
                id: 1,
                name: "Classic Subway",
                fog: { color: 0x222222, density: 0.015 },
                bgColor: 0x222222,
                lights: [
                    { type: 'directional', color: 0xffffff, intensity: 0.8, pos: [10, 20, 10] }
                ],
                objects: []
            },
            {
                id: 2,
                name: "Neon Night Run",
                fog: { color: 0x001133, density: 0.025 },
                bgColor: 0x001133,
                lights: [
                    { type: 'point', color: 0x00ffff, intensity: 1, pos: [-10, 5, -10], distance: 20 },
                    { type: 'point', color: 0xff00ff, intensity: 1, pos: [10, 5, -20], distance: 20 }
                ],
                objects: [
                    { type: 'neonLights', count: 10 }
                ]
            },
            {
                id: 3,
                name: "Desert Storm",
                fog: { color: 0xFFE4B5, density: 0.03 },
                bgColor: 0xFFE4B5,
                lights: [
                    { type: 'directional', color: 0xFFAA00, intensity: 1.2, pos: [20, 30, 10] }
                ],
                objects: [
                    { type: 'pyramids', count: 8 }
                ]
            },
            {
                id: 4,
                name: "Arctic Tundra",
                fog: { color: 0xE0FFFF, density: 0.04 },
                bgColor: 0xE0FFFF,
                lights: [
                    { type: 'directional', color: 0xCCEEFF, intensity: 0.9, pos: [0, 20, 10] }
                ],
                objects: [
                    { type: 'iceBlocks', count: 12 }
                ]
            },
            {
                id: 5,
                name: "Volcano Run",
                fog: { color: 0xFF4500, density: 0.035 },
                bgColor: 0xFF4500,
                lights: [
                    { type: 'point', color: 0xFF0000, intensity: 2, pos: [-10, 1, -10], distance: 15 },
                    { type: 'point', color: 0xFF0000, intensity: 2, pos: [10, 1, -30], distance: 15 }
                ],
                objects: [
                    { type: 'lavaRocks', count: 10 }
                ]
            },
            {
                id: 6,
                name: "Underwater Depths",
                fog: { color: 0x000080, density: 0.05 },
                bgColor: 0x000080,
                lights: [
                    { type: 'directional', color: 0x0088FF, intensity: 0.6, pos: [0, 20, 0] }
                ],
                objects: [
                    { type: 'bubbles', count: 15 }
                ]
            },
            {
                id: 7,
                name: "Jungle Temple",
                fog: { color: 0x2F4F2F, density: 0.04 },
                bgColor: 0x2F4F2F,
                lights: [
                    { type: 'directional', color: 0x88AA88, intensity: 0.7, pos: [10, 20, 10] }
                ],
                objects: [
                    { type: 'jungleTrees', count: 10 }
                ]
            },
            {
                id: 8,
                name: "Space Station",
                fog: { color: 0x000033, density: 0.02 },
                bgColor: 0x000000,
                lights: [
                    { type: 'directional', color: 0x6666FF, intensity: 0.5, pos: [0, 20, 10] }
                ],
                objects: [
                    { type: 'stars', count: 500 },
                    { type: 'spaceStations', count: 8 }
                ]
            },
            {
                id: 9,
                name: "Crystal Mines",
                fog: { color: 0x9400D3, density: 0.04 },
                bgColor: 0x4B0082,
                lights: [
                    { type: 'point', color: 0xFF00FF, intensity: 1, pos: [-10, 5, 0], distance: 30 },
                    { type: 'point', color: 0x00FFFF, intensity: 1, pos: [10, 5, -20], distance: 30 }
                ],
                objects: [
                    { type: 'crystals', count: 15 }
                ]
            },
            {
                id: 10,
                name: "Final Dimension",
                fog: { color: 0xFF1493, density: 0.07 },
                bgColor: 0x8B008B,
                lights: [
                    { type: 'directional', color: 0xFFD700, intensity: 0.5, pos: [0, 10, 0] }
                ],
                objects: [
                    { type: 'portals', count: 10 },
                    { type: 'rifts', count: 10 }
                ]
            }
        ];

        const ObjectGenerators = {
            neonLights: (count) => {
                for (let i = 0; i < count; i++) {
                    const light = new THREE.PointLight(0x00ffff, 1, 20);
                    light.position.set(-10 + Math.random() * 20, 5, -i * 10);
                    scene.add(light);
                    levelObjects.push(light);
                }
            },

            pyramids: (count) => {
                for (let i = 0; i < count; i++) {
                    const pyramid = new THREE.Mesh(
                        new THREE.ConeGeometry(3, 6, 4),
                        new THREE.MeshLambertMaterial({ color: 0xDEB887 })
                    );
                    pyramid.position.set(-15 + Math.random() * 30, 3, -i * 15);
                    pyramid.rotation.y = Math.PI / 4;
                    scene.add(pyramid);
                    levelObjects.push(pyramid);
                }
            },

            iceBlocks: (count) => {
                for (let i = 0; i < count; i++) {
                    const ice = new THREE.Mesh(
                        new THREE.IcosahedronGeometry(2 + Math.random() * 2),
                        new THREE.MeshPhongMaterial({
                            color: 0x88CCFF,
                            transparent: true,
                            opacity: 0.7,
                            shininess: 100
                        })
                    );
                    ice.position.set(-20 + Math.random() * 40, 2, -i * 10);
                    scene.add(ice);
                    levelObjects.push(ice);
                }
            },

            lavaRocks: (count) => {
                for (let i = 0; i < count; i++) {
                    const rock = new THREE.Mesh(
                        new THREE.DodecahedronGeometry(1.5),
                        new THREE.MeshLambertMaterial({
                            color: 0x8B4513,
                            emissive: 0xFF0000,
                            emissiveIntensity: 0.3
                        })
                    );
                    rock.position.set(-15 + Math.random() * 30, 2, -i * 12);
                    scene.add(rock);
                    levelObjects.push(rock);
                }
            },

            bubbles: (count) => {
                for (let i = 0; i < count; i++) {
                    const bubble = new THREE.Mesh(
                        new THREE.SphereGeometry(0.5 + Math.random() * 0.5),
                        new THREE.MeshPhongMaterial({
                            color: 0x88DDFF,
                            transparent: true,
                            opacity: 0.3
                        })
                    );
                    bubble.position.set(-20 + Math.random() * 40, -5 + Math.random() * 15, -i * 8);
                    scene.add(bubble);
                    levelObjects.push(bubble);
                }
            },

            jungleTrees: (count) => {
                for (let i = 0; i < count; i++) {
                    const tree = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.5, 0.7, 8),
                        new THREE.MeshLambertMaterial({ color: 0x8B4513 })
                    );
                    tree.position.set(-15 + Math.random() * 30, 4, -i * 12);
                    scene.add(tree);
                    levelObjects.push(tree);

                    const canopy = new THREE.Mesh(
                        new THREE.SphereGeometry(3),
                        new THREE.MeshLambertMaterial({ color: 0x228B22 })
                    );
                    canopy.position.set(tree.position.x, 8, tree.position.z);
                    scene.add(canopy);
                    levelObjects.push(canopy);
                }
            },

            stars: (count) => {
                const starGeom = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);

                for (let i = 0; i < count * 3; i += 3) {
                    positions[i] = (Math.random() - 0.5) * 200;
                    positions[i + 1] = (Math.random() - 0.5) * 200;
                    positions[i + 2] = -50 - Math.random() * 150;
                }

                starGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const stars = new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xFFFFFF, size: 0.5 }));
                scene.add(stars);
                levelObjects.push(stars);
            },

            spaceStations: (count) => {
                for (let i = 0; i < count; i++) {
                    const station = new THREE.Mesh(
                        new THREE.CylinderGeometry(2, 2, 8, 8),
                        new THREE.MeshLambertMaterial({ color: 0x444466, emissive: 0x222244, emissiveIntensity: 0.2 })
                    );
                    station.rotation.z = Math.PI / 2;
                    station.position.set(-30 + Math.random() * 60, 5, -i * 20);
                    scene.add(station);
                    levelObjects.push(station);
                }
            },

            crystals: (count) => {
                for (let i = 0; i < count; i++) {
                    const crystal = new THREE.Mesh(
                        new THREE.OctahedronGeometry(1 + Math.random() * 1.5),
                        new THREE.MeshPhongMaterial({
                            color: 0xFF00FF,
                            emissive: 0xFF00FF,
                            emissiveIntensity: 0.4,
                            transparent: true,
                            opacity: 0.8,
                            shininess: 100
                        })
                    );
                    crystal.position.set(-20 + Math.random() * 40, 2, -i * 8);
                    crystal.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                    scene.add(crystal);
                    levelObjects.push(crystal);
                }
            },

            portals: (count) => {
                for (let i = 0; i < count; i++) {
                    const portal = new THREE.Mesh(
                        new THREE.TorusGeometry(2, 0.3, 8, 16),
                        new THREE.MeshBasicMaterial({
                            color: 0x00FFFF,
                            emissive: 0x00FFFF,
                            emissiveIntensity: 1.0
                        })
                    );
                    portal.position.set(-20 + Math.random() * 40, 3, -i * 15);
                    scene.add(portal);
                    levelObjects.push(portal);
                }
            },

            rifts: (count) => {
                for (let i = 0; i < count; i++) {
                    const rift = new THREE.Mesh(
                        new THREE.SphereGeometry(1.5, 16, 8),
                        new THREE.MeshBasicMaterial({
                            color: 0xFF00FF,
                            wireframe: true,
                            transparent: true,
                            opacity: 0.4
                        })
                    );
                    rift.position.set(-15 + Math.random() * 30, 4, -i * 18);
                    scene.add(rift);
                    levelObjects.push(rift);
                }
            }
        };

        function loadLevel(levelId) {
            try {
                const config = LEVEL_CONFIGS.find(l => l.id === levelId);
                if (!config) {
                    throw new Error(`Level ${levelId} not found in LEVEL_CONFIGS`);
                }

                validateLevelConfig(config);

                console.log(`🎮 Loading Level ${levelId}: ${config.name}`);

                cleanupLevel();

                scene.fog = new THREE.FogExp2(config.fog.color, config.fog.density);
                renderer.setClearColor(config.bgColor);

                let lightsLoaded = 0;
                config.lights.forEach((lightConfig, index) => {
                    try {
                        let light;
                        if (lightConfig.type === 'directional') {
                            light = new THREE.DirectionalLight(lightConfig.color, lightConfig.intensity);
                        } else if (lightConfig.type === 'point') {
                            light = new THREE.PointLight(lightConfig.color, lightConfig.intensity, lightConfig.distance || 50);
                        } else {
                            throw new Error(`Unknown light type: ${lightConfig.type}`);
                        }
                        light.position.set(...lightConfig.pos);
                        scene.add(light);
                        levelObjects.push(light);
                        lightsLoaded++;
                    } catch (lightError) {
                        logError(`Error loading light ${index} in level ${levelId}`, lightError);
                    }
                });

                let objectsLoaded = 0;
                config.objects.forEach(objConfig => {
                    const genKey = `${levelId}-${objConfig.type}`;
                    try {
                        const generator = ObjectGenerators[objConfig.type];
                        if (generator) {
                            let completed = false;
                            const timeout = setTimeout(() => {
                                if (!completed) {
                                    logError(`Generator timeout: ${objConfig.type} took >${MAX_GENERATOR_TIME}ms`);
                                }
                            }, MAX_GENERATOR_TIME);

                            generatorTimeouts[genKey] = timeout;

                            generator(objConfig.count);
                            completed = true;
                            clearTimeout(timeout);
                            delete generatorTimeouts[genKey];
                            objectsLoaded++;
                        } else {
                            const warning = `No generator for type: ${objConfig.type}`;
                            console.warn(`⚠️ ${warning}`);
                            generatorWarnings.push(warning);

                            createFallbackObjects(objConfig.count);
                            objectsLoaded++;
                        }
                    } catch (genError) {
                        logError(`Generator error for ${objConfig.type}`, genError);
                        clearTimeout(generatorTimeouts[genKey]);
                        delete generatorTimeouts[genKey];

                        try {
                            createFallbackObjects(objConfig.count);
                            console.log(`✅ Used fallback for ${objConfig.type}`);
                        } catch (fallbackError) {
                            logError('Fallback also failed', fallbackError);
                        }
                    }
                });

                currentLevelId = levelId;
                updateUI(config.name);
                console.log(`✅ Level ${levelId} loaded! ${lightsLoaded} lights, ${objectsLoaded} object types`);
            } catch (error) {
                logError(`Failed to load Level ${levelId}`, error);
                const btn = document.getElementById(`btn-${levelId}`);
                if (btn) btn.classList.add('error');
            }
        }

        function cleanupLevel() {
            try {
                Object.values(generatorTimeouts).forEach(timeout => clearTimeout(timeout));
                generatorTimeouts = {};

                levelObjects.forEach(obj => {
                    try {
                        if (obj.parent) obj.parent.remove(obj);
                        if (obj.geometry && !geometryPool.has(obj.geometry.uuid)) {
                            obj.geometry.dispose();
                        }
                        if (obj.material) {
                            if (Array.isArray(obj.material)) {
                                obj.material.forEach(mat => {
                                    if (!materialPool.has(mat.uuid)) mat.dispose();
                                });
                            } else {
                                if (!materialPool.has(obj.material.uuid)) {
                                    obj.material.dispose();
                                }
                            }
                        }
                    } catch (disposeError) {
                        console.warn('Error disposing object:', disposeError);
                    }
                });
                levelObjects = [];
            } catch (error) {
                logError('Cleanup error', error);
            }
        }

        function init() {
            try {
                if (typeof THREE === 'undefined') {
                    throw new Error('THREE.js not loaded');
                }

                console.log('✅ THREE.js loaded:', THREE.REVISION);

                LEVEL_CONFIGS.forEach((config, index) => {
                    try {
                        validateLevelConfig(config);
                    } catch (validationError) {
                        logError(`Invalid config for level ${index + 1}`, validationError);
                    }
                });

                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 5, 10);
                camera.lookAt(0, 2, 0);

                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
                scene.add(ambientLight);

                console.log(`✅ ${LEVEL_CONFIGS.length} levels configured!`);

                updateConfigStatus();
                createLevelButtons();
                loadLevel(1);

                animate();
            } catch (error) {
                logError('Critical initialization error', error);
            }
        }

        function createLevelButtons() {
            const container = document.getElementById('levelButtons');
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.textContent = `L${i}`;
                btn.id = `btn-${i}`;
                btn.onclick = () => loadLevel(i);
                container.appendChild(btn);
            }
        }

        function updateUI(levelName) {
            document.getElementById('currentLevel').textContent = currentLevelId;
            document.getElementById('levelName').textContent = levelName;
            document.getElementById('score').textContent = score;

            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.remove('current');
            });
            const currentBtn = document.getElementById(`btn-${currentLevelId}`);
            if (currentBtn) currentBtn.classList.add('current');
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                autoCycle = !autoCycle;
                if (autoCycle) {
                    console.log('🔄 Auto-cycle enabled');
                    autoCycleInterval = setInterval(() => {
                        const nextLevel = (currentLevelId % 10) + 1;
                        loadLevel(nextLevel);
                        score += 100;
                    }, 3000);
                } else {
                    console.log('⏸️ Auto-cycle disabled');
                    clearInterval(autoCycleInterval);
                }
            }

            const digit = parseInt(e.key);
            if (digit >= 1 && digit <= 9) {
                loadLevel(digit);
                score += 100;
            } else if (e.key === '0') {
                loadLevel(10);
                score += 100;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.hotReloadConfig = hotReloadConfig;
        window.clearPoolsNow = clearPools;

        console.log('💡 Hot-reload available: window.hotReloadConfig([...new configs])');
        console.log('💡 Clear pools: window.clearPoolsNow()');

        init();
    </script>
</body>
</html>
