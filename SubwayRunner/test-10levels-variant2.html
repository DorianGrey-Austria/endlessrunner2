<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 TEST: 10 Levels Variant 2 - Array-Based Config</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            font-size: 14px;
            line-height: 1.6;
        }
        .level-btn {
            background: #00ff00;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .level-btn:hover { background: #00cc00; }
        .current { background: #ff00ff !important; }
    </style>
</head>
<body>
    <div id="info">
        <h2>🎮 VARIANT 2: Array-Based Config System</h2>
        <p><strong>Current Level:</strong> <span id="currentLevel">1</span></p>
        <p><strong>Level Name:</strong> <span id="levelName">-</span></p>
        <p><strong>Score:</strong> <span id="score">0</span></p>
        <p><strong>Approach:</strong> Minimalist config array with generator functions</p>
        <div id="levelButtons"></div>
        <p style="margin-top: 15px; font-size: 12px; color: #aaa;">
            Press 1-9,0 to test each level<br>
            Space = Auto-cycle through all levels
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let currentLevelId = 1;
        let score = 0;
        let autoCycle = false;
        let autoCycleInterval = null;
        let levelObjects = [];

        const LEVEL_CONFIGS = [
            {
                id: 1,
                name: "Classic Subway",
                fog: { color: 0x222222, density: 0.015 },
                bgColor: 0x222222,
                lights: [
                    { type: 'directional', color: 0xffffff, intensity: 0.8, pos: [10, 20, 10] }
                ],
                objects: []
            },
            {
                id: 2,
                name: "Neon Night Run",
                fog: { color: 0x001133, density: 0.025 },
                bgColor: 0x001133,
                lights: [
                    { type: 'point', color: 0x00ffff, intensity: 1, pos: [-10, 5, -10], distance: 20 },
                    { type: 'point', color: 0xff00ff, intensity: 1, pos: [10, 5, -20], distance: 20 }
                ],
                objects: [
                    { type: 'neonLights', count: 10 }
                ]
            },
            {
                id: 3,
                name: "Desert Storm",
                fog: { color: 0xFFE4B5, density: 0.03 },
                bgColor: 0xFFE4B5,
                lights: [
                    { type: 'directional', color: 0xFFAA00, intensity: 1.2, pos: [20, 30, 10] }
                ],
                objects: [
                    { type: 'pyramids', count: 8 }
                ]
            },
            {
                id: 4,
                name: "Arctic Tundra",
                fog: { color: 0xE0FFFF, density: 0.04 },
                bgColor: 0xE0FFFF,
                lights: [
                    { type: 'directional', color: 0xCCEEFF, intensity: 0.9, pos: [0, 20, 10] }
                ],
                objects: [
                    { type: 'iceBlocks', count: 12 }
                ]
            },
            {
                id: 5,
                name: "Volcano Run",
                fog: { color: 0xFF4500, density: 0.035 },
                bgColor: 0xFF4500,
                lights: [
                    { type: 'point', color: 0xFF0000, intensity: 2, pos: [-10, 1, -10], distance: 15 },
                    { type: 'point', color: 0xFF0000, intensity: 2, pos: [10, 1, -30], distance: 15 }
                ],
                objects: [
                    { type: 'lavaRocks', count: 10 }
                ]
            },
            {
                id: 6,
                name: "Underwater Depths",
                fog: { color: 0x000080, density: 0.05 },
                bgColor: 0x000080,
                lights: [
                    { type: 'directional', color: 0x0088FF, intensity: 0.6, pos: [0, 20, 0] }
                ],
                objects: [
                    { type: 'bubbles', count: 15 }
                ]
            },
            {
                id: 7,
                name: "Jungle Temple",
                fog: { color: 0x2F4F2F, density: 0.04 },
                bgColor: 0x2F4F2F,
                lights: [
                    { type: 'directional', color: 0x88AA88, intensity: 0.7, pos: [10, 20, 10] }
                ],
                objects: [
                    { type: 'jungleTrees', count: 10 }
                ]
            },
            {
                id: 8,
                name: "Space Station",
                fog: { color: 0x000033, density: 0.02 },
                bgColor: 0x000000,
                lights: [
                    { type: 'directional', color: 0x6666FF, intensity: 0.5, pos: [0, 20, 10] }
                ],
                objects: [
                    { type: 'stars', count: 500 },
                    { type: 'spaceStations', count: 8 }
                ]
            },
            {
                id: 9,
                name: "Crystal Mines",
                fog: { color: 0x9400D3, density: 0.04 },
                bgColor: 0x4B0082,
                lights: [
                    { type: 'point', color: 0xFF00FF, intensity: 1, pos: [-10, 5, 0], distance: 30 },
                    { type: 'point', color: 0x00FFFF, intensity: 1, pos: [10, 5, -20], distance: 30 }
                ],
                objects: [
                    { type: 'crystals', count: 15 }
                ]
            },
            {
                id: 10,
                name: "Final Dimension",
                fog: { color: 0xFF1493, density: 0.07 },
                bgColor: 0x8B008B,
                lights: [
                    { type: 'directional', color: 0xFFD700, intensity: 0.5, pos: [0, 10, 0] }
                ],
                objects: [
                    { type: 'portals', count: 10 },
                    { type: 'rifts', count: 10 }
                ]
            }
        ];

        const ObjectGenerators = {
            neonLights: (count) => {
                for (let i = 0; i < count; i++) {
                    const light = new THREE.PointLight(0x00ffff, 1, 20);
                    light.position.set(-10 + Math.random() * 20, 5, -i * 10);
                    scene.add(light);
                    levelObjects.push(light);
                }
            },

            pyramids: (count) => {
                for (let i = 0; i < count; i++) {
                    const pyramid = new THREE.Mesh(
                        new THREE.ConeGeometry(3, 6, 4),
                        new THREE.MeshLambertMaterial({ color: 0xDEB887 })
                    );
                    pyramid.position.set(-15 + Math.random() * 30, 3, -i * 15);
                    pyramid.rotation.y = Math.PI / 4;
                    scene.add(pyramid);
                    levelObjects.push(pyramid);
                }
            },

            iceBlocks: (count) => {
                for (let i = 0; i < count; i++) {
                    const ice = new THREE.Mesh(
                        new THREE.IcosahedronGeometry(2 + Math.random() * 2),
                        new THREE.MeshPhongMaterial({
                            color: 0x88CCFF,
                            transparent: true,
                            opacity: 0.7,
                            shininess: 100
                        })
                    );
                    ice.position.set(-20 + Math.random() * 40, 2, -i * 10);
                    scene.add(ice);
                    levelObjects.push(ice);
                }
            },

            lavaRocks: (count) => {
                for (let i = 0; i < count; i++) {
                    const rock = new THREE.Mesh(
                        new THREE.DodecahedronGeometry(1.5),
                        new THREE.MeshLambertMaterial({
                            color: 0x8B4513,
                            emissive: 0xFF0000,
                            emissiveIntensity: 0.3
                        })
                    );
                    rock.position.set(-15 + Math.random() * 30, 2, -i * 12);
                    scene.add(rock);
                    levelObjects.push(rock);
                }
            },

            bubbles: (count) => {
                for (let i = 0; i < count; i++) {
                    const bubble = new THREE.Mesh(
                        new THREE.SphereGeometry(0.5 + Math.random() * 0.5),
                        new THREE.MeshPhongMaterial({
                            color: 0x88DDFF,
                            transparent: true,
                            opacity: 0.3
                        })
                    );
                    bubble.position.set(-20 + Math.random() * 40, -5 + Math.random() * 15, -i * 8);
                    scene.add(bubble);
                    levelObjects.push(bubble);
                }
            },

            jungleTrees: (count) => {
                for (let i = 0; i < count; i++) {
                    const tree = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.5, 0.7, 8),
                        new THREE.MeshLambertMaterial({ color: 0x8B4513 })
                    );
                    tree.position.set(-15 + Math.random() * 30, 4, -i * 12);
                    scene.add(tree);
                    levelObjects.push(tree);

                    const canopy = new THREE.Mesh(
                        new THREE.SphereGeometry(3),
                        new THREE.MeshLambertMaterial({ color: 0x228B22 })
                    );
                    canopy.position.set(tree.position.x, 8, tree.position.z);
                    scene.add(canopy);
                    levelObjects.push(canopy);
                }
            },

            stars: (count) => {
                const starGeom = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);

                for (let i = 0; i < count * 3; i += 3) {
                    positions[i] = (Math.random() - 0.5) * 200;
                    positions[i + 1] = (Math.random() - 0.5) * 200;
                    positions[i + 2] = -50 - Math.random() * 150;
                }

                starGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const stars = new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xFFFFFF, size: 0.5 }));
                scene.add(stars);
                levelObjects.push(stars);
            },

            spaceStations: (count) => {
                for (let i = 0; i < count; i++) {
                    const station = new THREE.Mesh(
                        new THREE.CylinderGeometry(2, 2, 8, 8),
                        new THREE.MeshLambertMaterial({ color: 0x444466, emissive: 0x222244, emissiveIntensity: 0.2 })
                    );
                    station.rotation.z = Math.PI / 2;
                    station.position.set(-30 + Math.random() * 60, 5, -i * 20);
                    scene.add(station);
                    levelObjects.push(station);
                }
            },

            crystals: (count) => {
                for (let i = 0; i < count; i++) {
                    const crystal = new THREE.Mesh(
                        new THREE.OctahedronGeometry(1 + Math.random() * 1.5),
                        new THREE.MeshPhongMaterial({
                            color: 0xFF00FF,
                            emissive: 0xFF00FF,
                            emissiveIntensity: 0.4,
                            transparent: true,
                            opacity: 0.8,
                            shininess: 100
                        })
                    );
                    crystal.position.set(-20 + Math.random() * 40, 2, -i * 8);
                    crystal.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                    scene.add(crystal);
                    levelObjects.push(crystal);
                }
            },

            portals: (count) => {
                for (let i = 0; i < count; i++) {
                    const portal = new THREE.Mesh(
                        new THREE.TorusGeometry(2, 0.3, 8, 16),
                        new THREE.MeshBasicMaterial({
                            color: 0x00FFFF,
                            emissive: 0x00FFFF,
                            emissiveIntensity: 1.0
                        })
                    );
                    portal.position.set(-20 + Math.random() * 40, 3, -i * 15);
                    scene.add(portal);
                    levelObjects.push(portal);
                }
            },

            rifts: (count) => {
                for (let i = 0; i < count; i++) {
                    const rift = new THREE.Mesh(
                        new THREE.SphereGeometry(1.5, 16, 8),
                        new THREE.MeshBasicMaterial({
                            color: 0xFF00FF,
                            wireframe: true,
                            transparent: true,
                            opacity: 0.4
                        })
                    );
                    rift.position.set(-15 + Math.random() * 30, 4, -i * 18);
                    scene.add(rift);
                    levelObjects.push(rift);
                }
            }
        };

        function loadLevel(levelId) {
            const config = LEVEL_CONFIGS.find(l => l.id === levelId);
            if (!config) {
                console.error(`❌ Level ${levelId} not found!`);
                return;
            }

            console.log(`🎮 Loading Level ${levelId}: ${config.name}`);

            cleanupLevel();

            scene.fog = new THREE.FogExp2(config.fog.color, config.fog.density);
            renderer.setClearColor(config.bgColor);

            config.lights.forEach(lightConfig => {
                let light;
                if (lightConfig.type === 'directional') {
                    light = new THREE.DirectionalLight(lightConfig.color, lightConfig.intensity);
                } else if (lightConfig.type === 'point') {
                    light = new THREE.PointLight(lightConfig.color, lightConfig.intensity, lightConfig.distance || 50);
                }
                light.position.set(...lightConfig.pos);
                scene.add(light);
                levelObjects.push(light);
            });

            config.objects.forEach(objConfig => {
                const generator = ObjectGenerators[objConfig.type];
                if (generator) {
                    generator(objConfig.count);
                } else {
                    console.warn(`⚠️ No generator for type: ${objConfig.type}`);
                }
            });

            currentLevelId = levelId;
            updateUI(config.name);
            console.log(`✅ Level ${levelId} loaded successfully!`);
        }

        function cleanupLevel() {
            levelObjects.forEach(obj => {
                if (obj.parent) obj.parent.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) {
                    if (Array.isArray(obj.material)) {
                        obj.material.forEach(mat => mat.dispose());
                    } else {
                        obj.material.dispose();
                    }
                }
            });
            levelObjects = [];
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            console.log(`✅ ${LEVEL_CONFIGS.length} levels configured!`);

            createLevelButtons();
            loadLevel(1);

            animate();
        }

        function createLevelButtons() {
            const container = document.getElementById('levelButtons');
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.textContent = `L${i}`;
                btn.id = `btn-${i}`;
                btn.onclick = () => loadLevel(i);
                container.appendChild(btn);
            }
        }

        function updateUI(levelName) {
            document.getElementById('currentLevel').textContent = currentLevelId;
            document.getElementById('levelName').textContent = levelName;
            document.getElementById('score').textContent = score;

            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.remove('current');
            });
            const currentBtn = document.getElementById(`btn-${currentLevelId}`);
            if (currentBtn) currentBtn.classList.add('current');
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                autoCycle = !autoCycle;
                if (autoCycle) {
                    console.log('🔄 Auto-cycle enabled');
                    autoCycleInterval = setInterval(() => {
                        const nextLevel = (currentLevelId % 10) + 1;
                        loadLevel(nextLevel);
                        score += 100;
                    }, 3000);
                } else {
                    console.log('⏸️ Auto-cycle disabled');
                    clearInterval(autoCycleInterval);
                }
            }

            const digit = parseInt(e.key);
            if (digit >= 1 && digit <= 9) {
                loadLevel(digit);
                score += 100;
            } else if (e.key === '0') {
                loadLevel(10);
                score += 100;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
