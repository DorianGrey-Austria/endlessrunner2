<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Startup Debug Test</title>
    <style>
        body { 
            background: #222; 
            color: #0f0; 
            font-family: monospace; 
            padding: 20px;
        }
        .test { 
            margin: 10px 0; 
            padding: 10px; 
            border: 1px solid #0f0;
        }
        .error { 
            color: #f00; 
            border-color: #f00;
        }
        .success { 
            color: #0f0;
        }
        #console {
            background: #000;
            padding: 10px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            margin: 2px 0;
        }
        .log-error { color: #f00; }
        .log-warn { color: #ff0; }
        .log-info { color: #0ff; }
    </style>
</head>
<body>
    <h1>🔍 SubwayRunner Startup Diagnostics</h1>
    
    <div id="tests"></div>
    
    <h2>Console Output:</h2>
    <div id="console"></div>
    
    <h2>Test Actions:</h2>
    <button onclick="testStartGame()">Test startGame()</button>
    <button onclick="testThree()">Test Three.js</button>
    <button onclick="loadActualGame()">Load Actual Game</button>
    
    <script>
        const testsDiv = document.getElementById('tests');
        const consoleDiv = document.getElementById('console');
        
        // Override console methods to capture output
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function logToDiv(message, type = 'log') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${type.toUpperCase()}] ${message}`;
            consoleDiv.appendChild(entry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            logToDiv(args.join(' '), 'info');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            logToDiv(args.join(' '), 'error');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            logToDiv(args.join(' '), 'warn');
        };
        
        // Capture global errors
        window.addEventListener('error', (e) => {
            logToDiv(`Global Error: ${e.message} at ${e.filename}:${e.lineno}:${e.colno}`, 'error');
            addTest('Global Error Detection', false, `${e.message} at line ${e.lineno}`);
        });
        
        function addTest(name, success, details = '') {
            const div = document.createElement('div');
            div.className = `test ${success ? 'success' : 'error'}`;
            div.innerHTML = `<strong>${success ? '✅' : '❌'} ${name}:</strong> ${details}`;
            testsDiv.appendChild(div);
        }
        
        // Test 1: Check if Three.js loads
        function testThree() {
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/three@0.158.0/build/three.min.js';
            script.onload = () => {
                if (typeof THREE !== 'undefined') {
                    addTest('Three.js Loading', true, `Version: ${THREE.REVISION}`);
                    console.log('Three.js loaded successfully');
                } else {
                    addTest('Three.js Loading', false, 'THREE is undefined after load');
                }
            };
            script.onerror = () => {
                addTest('Three.js Loading', false, 'Failed to load script');
            };
            document.head.appendChild(script);
        }
        
        // Test 2: Test startGame function availability
        function testStartGame() {
            // Create an iframe to test the actual game
            const iframe = document.createElement('iframe');
            iframe.src = 'index.html';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            iframe.onload = () => {
                setTimeout(() => {
                    try {
                        const hasStartGame = typeof iframe.contentWindow.startGame === 'function';
                        addTest('startGame Function', hasStartGame, 
                            hasStartGame ? 'Function exists in window' : 'Function NOT found');
                        
                        if (hasStartGame) {
                            // Check if startGameInternal exists
                            const hasInternal = typeof iframe.contentWindow.startGameInternal === 'function';
                            addTest('startGameInternal', hasInternal,
                                hasInternal ? 'Internal function exists' : 'Internal function NOT found');
                        }
                        
                        // Check for scene
                        const hasScene = typeof iframe.contentWindow.scene !== 'undefined';
                        addTest('Three.js Scene', hasScene,
                            hasScene ? 'Scene initialized' : 'Scene NOT initialized');
                        
                        // Check console for errors
                        if (iframe.contentWindow.console && iframe.contentWindow.console.error) {
                            console.warn('Check iframe console for additional errors');
                        }
                        
                    } catch (e) {
                        addTest('Iframe Access', false, e.message);
                    }
                    
                    // Remove iframe after test
                    setTimeout(() => {
                        document.body.removeChild(iframe);
                    }, 1000);
                }, 2000); // Wait 2 seconds for initialization
            };
        }
        
        // Test 3: Load actual game and monitor
        function loadActualGame() {
            window.location.href = 'index.html';
        }
        
        // Auto-run basic tests
        window.onload = () => {
            console.log('Debug page loaded, starting tests...');
            
            // Test 1: Check current page
            addTest('Debug Page', true, 'Loaded successfully');
            
            // Test 2: Check browser compatibility
            addTest('Browser Compatibility', true, navigator.userAgent);
            
            // Test 3: Check localStorage
            try {
                localStorage.setItem('test', '1');
                localStorage.removeItem('test');
                addTest('LocalStorage', true, 'Available');
            } catch (e) {
                addTest('LocalStorage', false, 'Not available');
            }
            
            // Test 4: Check WebGL
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            addTest('WebGL Support', !!gl, gl ? 'Available' : 'NOT available');
            
            console.log('Basic tests completed. Click buttons for advanced tests.');
        };
    </script>
</body>
</html>
